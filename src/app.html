<!doctype html>
<html lang="en" data-theme="pine">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta name="description" content="Lautronome — a metronome with a built-in interval timer for practice." />
		<link rel="canonical" href="https://laaraujo.github.io/lautronome/" />

		<meta property="og:site_name" content="Lautronome" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://laaraujo.github.io/lautronome/" />
		<meta property="og:title" content="Lautronome — metronome & timer" />
		<meta property="og:description" content="A metronome with a built-in interval timer for practice." />
		<meta
			property="og:image"
			content="https://laaraujo.github.io/lautronome/android-chrome-512x512.png"
		/>

		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Lautronome — metronome & timer" />
		<meta name="twitter:description" content="A metronome with a built-in interval timer for practice." />
		<meta
			name="twitter:image"
			content="https://laaraujo.github.io/lautronome/android-chrome-512x512.png"
		/>

		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebSite",
				"name": "Lautronome",
				"alternateName": "Lautronome — metronome & timer",
				"url": "https://laaraujo.github.io/lautronome/",
				"description": "A metronome with a built-in interval timer for practice.",
				"inLanguage": ["en", "es", "fr", "pt", "zh", "hi"]
			}
		</script>

		<meta name="theme-color" content="#3b6cf3" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Lautronome" />
		<meta name="google-site-verification" content="K0_hX5qsHFgJXZwZ9UDMAW7FzaT-EVjtjcGkZnY7Y68" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
		<script>
			(function () {
				try {
					var saved = localStorage.getItem('mode');
					var mode = saved
						? saved
						: window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
					document.documentElement.setAttribute('data-mode', mode);
				} catch (e) {
					document.documentElement.setAttribute('data-mode', 'light');
				}
			})();
		</script>
		<script
			data-goatcounter="https://lautronome.goatcounter.com/count"
			async
			src="//gc.zgo.at/count.js"
		></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
